name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build Linux amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dismap-linux-amd64 ./cmd/dismap

      - name: Build Linux arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dismap-linux-arm64 ./cmd/dismap

      - name: Build Darwin amd64
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dismap-darwin-amd64 ./cmd/dismap

      - name: Build Darwin arm64
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dismap-darwin-arm64 ./cmd/dismap

      - name: Build Windows amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dismap-windows-amd64.exe ./cmd/dismap

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dismap-linux-amd64
            dismap-linux-arm64
            dismap-darwin-amd64
            dismap-darwin-arm64
            dismap-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
